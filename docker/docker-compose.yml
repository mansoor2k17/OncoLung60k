version: '3.8'

services:
  oncolung60k:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: oncolung60k:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONPATH=/workspace
    volumes:
      - ../:/workspace
      - ../data:/workspace/data
      - ../checkpoints:/workspace/checkpoints
      - ../runs:/workspace/runs
    working_dir: /workspace
    shm_size: '8gb'
    tty: true
    stdin_open: true
    command: /bin/bash
