# Ablation: msp_ce (MSP=true, CE=true, FF=false)
model:
  name: modified_convnext
  pretrained: true
  use_msp: true
  use_ce: true
  use_ff: false

splits_csv: splits/oncolung60k_5fold.csv
num_classes: 4
class_names: [Adeno, SCC, SCLC, Normal]
image_size: 256

seed: 42
epochs: 100
batch_size: 32
num_workers: 4
amp: true
test_fold: 0

lr: 1.0e-4
min_lr: 1.0e-6
weight_decay: 1.0e-3
label_smoothing: 0.1
early_stop_patience: 10
