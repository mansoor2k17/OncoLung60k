# Modified ConvNeXt with full ECB on OncoLung60K
# Reproduces the headline result: 91.3 +/- 0.9% accuracy

model:
  name: modified_convnext
  pretrained: true     # ImageNet-1k pretrained ConvNeXt-Base
  use_msp: true        # Multi-scale pooling
  use_ce: true         # Contrast enhancement
  use_ff: true         # Feature fusion

# Data
splits_csv: splits/oncolung60k_5fold.csv
num_classes: 4
class_names: [Adeno, SCC, SCLC, Normal]
image_size: 256

# Training
seed: 42
epochs: 100
batch_size: 32
num_workers: 4
amp: true
test_fold: 0          # only used for single-fold runs

# Optimisation
lr: 1.0e-4
min_lr: 1.0e-6
weight_decay: 1.0e-3
label_smoothing: 0.1
early_stop_patience: 10

# Augmentation (handled in src/data/augmentation.py)
augmentation:
  flip: true
  rotation_deg: 15
  color_jitter: 0.1
